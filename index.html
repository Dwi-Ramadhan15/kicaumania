<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kicau Mania - Hand Tracking</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            overflow: hidden;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }
        
        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        /* Video disembunyikan, kita gambar ulang di canvas beserta garis tangannya */
        
        video {
            display: none;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* Mirror effect */
        }
        
        #status {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            transition: color 0.3s;
        }
        /* Kotak visual pembantu untuk area pemicu (Area Wajah) */
        
        .target-box {
            position: absolute;
            top: 20%;
            left: 30%;
            width: 40%;
            height: 50%;
            border: 3px dashed rgba(255, 255, 255, 0.4);
            pointer-events: none;
            border-radius: 20px;
            z-index: 5;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>

    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div class="target-box"></div>
    </div>
    <div id="status">Klik layar untuk mengaktifkan kamera!</div>

    <audio id="kicauAudio" src="kicau.mp3" loop></audio>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const audioElement = document.getElementById('kicauAudio');
        const statusText = document.getElementById('status');

        // Set resolusi internal canvas
        canvasElement.width = 640;
        canvasElement.height = 480;

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            // Gambar tangkapan video ke canvas
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            let handInTriggerArea = false;

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // Gambar garis skeleton di tangan
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
                        color: '#00FF00',
                        lineWidth: 4
                    });
                    drawLandmarks(canvasCtx, landmarks, {
                        color: '#FF0000',
                        lineWidth: 2,
                        radius: 3
                    });

                    // LOGIKA UTAMA: Cek apakah ada titik tangan di area tengah (X: 30%-70%, Y: 20%-70%)
                    const inArea = landmarks.some(point =>
                        point.x > 0.30 && point.x < 0.70 &&
                        point.y > 0.20 && point.y < 0.70
                    );

                    if (inArea) handInTriggerArea = true;
                }
            }

            // Kontrol Audio
            if (handInTriggerArea) {
                statusText.innerText = "KICAU MANIA MANTAP! 🐦🔥";
                statusText.style.color = "#00FF00";

                // Play audio jika sedang pause
                if (audioElement.paused) {
                    audioElement.play().catch(e => console.log("Menunggu interaksi user..."));
                }
            } else {
                statusText.innerText = "Arahkan tangan ke dalam kotak putus-putus";
                statusText.style.color = "white";

                // Pause audio jika tangan keluar area
                if (!audioElement.paused) {
                    audioElement.pause();
                }
            }
            canvasCtx.restore();
        }

        // Inisialisasi MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        hands.onResults(onResults);

        // Inisialisasi Kamera
        const camera = new Camera(videoElement, {
            onFrame: async() => {
                await hands.send({
                    image: videoElement
                });
            },
            width: 640,
            height: 480
        });

        // Browser modern wajib ada interaksi klik/sentuh dari user sebelum mengizinkan Audio Play
        document.body.addEventListener('click', () => {
            camera.start();
            statusText.innerText = "Memuat kamera & AI...";
        }, {
            once: true
        });
    </script>
</body>

</html>
