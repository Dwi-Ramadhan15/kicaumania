<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kicau Kucing Mania - Flurry Mode! 🐱</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 960px;
            max-height: 720px;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            background-color: #000;
        }
        
        video {
            display: none;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        #status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            text-align: center;
        }
        
        #status {
            font-size: 18px;
            font-weight: bold;
            transition: color 0.3s;
        }
        
        .target-box {
            position: absolute;
            top: 25%;
            left: 25%;
            width: 50%;
            height: 50%;
            border: 4px dashed rgba(255, 255, 255, 0.4);
            pointer-events: none;
            border-radius: 20px;
            z-index: 5;
        }
        
        #gif-flurry-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        
        .flurry-cat {
            position: absolute;
            width: 80px;
            height: auto;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.2s ease-out, transform 0.2s ease-out;
            transform: scale(0.5);
        }
        
        .flurry-cat.show {
            opacity: 1;
            transform: scale(1);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="gif-flurry-container"></div>
        <div class="target-box"></div>
    </div>
    <div id="status-bar">
        <div id="status">Klik layar (Tap) untuk aktifkan kamera & audio</div>
    </div>
    <audio id="kicauAudio" src="kicau.mp3" loop></audio>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const audioElement = document.getElementById('kicauAudio');
        const statusText = document.getElementById('status');
        const flurryContainer = document.getElementById('gif-flurry-container');

        canvasElement.width = 640;
        canvasElement.height = 480;

        const gifSource = "kicaukucing.gif";
        const catCount = 12;
        const catSpawnDelay = 80;

        let catsArr = [];
        let flurryInterval;
        let isFlurrying = false;

        function preSpawnCats() {
            flurryContainer.innerHTML = '';
            catsArr = [];
            for (let i = 0; i < catCount; i++) {
                const img = document.createElement('img');
                img.src = gifSource;
                img.className = 'flurry-cat';
                flurryContainer.appendChild(img);
                catsArr.push(img);
            }
        }

        function showCatsFlurry() {
            if (isFlurrying) return;
            isFlurrying = true;
            statusText.innerText = "KICAU MANIA MANTAP! 🐱🐦🔥";
            statusText.style.color = "#00FF00";

            let currentCatIdx = 0;
            flurryInterval = setInterval(() => {
                if (currentCatIdx < catCount) {
                    const cat = catsArr[currentCatIdx];
                    const topPos = (25 + Math.random() * 50) + '%';
                    const leftPos = (25 + Math.random() * 50) + '%';
                    cat.style.top = topPos;
                    cat.style.left = leftPos;

                    const tilt = (Math.random() - 0.5) * 30;
                    cat.style.transform += ` rotate(${tilt}deg)`;

                    cat.classList.add('show');
                    currentCatIdx++;
                } else {
                    clearInterval(flurryInterval);
                }
            }, catSpawnDelay);
        }

        function hideCats() {
            if (!isFlurrying && catsArr.some(cat => cat.classList.contains('show'))) {
                clearInterval(flurryInterval);
                statusText.innerText = "Arahkan tangan ke dalam kotak putus-putus";
                statusText.style.color = "white";
                catsArr.forEach(cat => cat.classList.remove('show'));
            } else if (isFlurrying) {
                clearInterval(flurryInterval);
                isFlurrying = false;
                hideCats();
            }
        }

        preSpawnCats();

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            let handInTriggerArea = false;

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
                        color: '#00FF00',
                        lineWidth: 4
                    });
                    drawLandmarks(canvasCtx, landmarks, {
                        color: '#FF0000',
                        lineWidth: 2,
                        radius: 3
                    });

                    const inArea = landmarks.some(point =>
                        point.x > 0.25 && point.x < 0.75 &&
                        point.y > 0.25 && point.y < 0.75
                    );

                    if (inArea) handInTriggerArea = true;
                }
            }

            if (handInTriggerArea) {
                showCatsFlurry();
                if (audioElement.paused) {
                    audioElement.play().catch(e => console.log(e));
                }
            } else {
                hideCats();
                if (!audioElement.paused) {
                    audioElement.pause();
                }
            }
            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async() => {
                await hands.send({
                    image: videoElement
                });
            },
            width: 640,
            height: 480
        });

        window.addEventListener('resize', () => {
            preSpawnCats();
        });

        document.body.addEventListener('click', () => {
            camera.start();
            statusText.innerText = "Memuat kamera & AI (tunggu 2 detik)...";
        }, {
            once: true
        });
    </script>
</body>

</html>
